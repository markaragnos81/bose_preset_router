name: Hassfest

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare integration layout
        run: |
          mkdir -p ha_config/custom_components/bose_preset_router
          shopt -s dotglob
          for path in *; do
            case "$path" in
              .git|.github|custom_components|docs|ha_config|__pycache__)
                ;;
              *)
                cp -R "$path" ha_config/custom_components/bose_preset_router/
                ;;
            esac
          done

      - name: Hassfest validation
        run: docker run --rm -v "$PWD/ha_config:/github/workspace" ghcr.io/home-assistant/hassfest
