name: Hassfest

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare integration layout
        run: |
          mkdir -p custom_components/bose_preset_router
          shopt -s dotglob
          for path in *; do
            case "$path" in
              .git|.github|custom_components|docs|__pycache__)
                ;;
              *)
                cp -R "$path" custom_components/bose_preset_router/
                ;;
            esac
          done

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
